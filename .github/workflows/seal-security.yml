name: Seal Security Remediation

on:
  workflow_dispatch:
    inputs:
      fix_mode:
        description: 'Fix mode: remote (UI-approved), local (actions file), or all (everything available)'
        required: true
        default: 'remote'
        type: choice
        options:
          - remote
          - local
          - all

jobs:
  remediate-and-run:
    runs-on: windows-2022
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Download Seal CLI (Windows x64 v0.3.238)
        shell: pwsh
        run: |
          $cliUrl = "https://github.com/seal-community/cli/releases/download/v0.3.238/seal-windows-amd64-v0.3.238.exe"
          Invoke-WebRequest -Uri $cliUrl -OutFile seal.exe
          Write-Host "Seal CLI downloaded"
          .\seal.exe version

      - name: Seal Security - Fix Vulnerabilities
        shell: pwsh
        run: |
          .\seal.exe fix . --mode ${{ github.event.inputs.fix_mode || 'remote' }} -v
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Restore with Sealed Packages
        run: dotnet restore
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Build Application
        run: dotnet build --no-restore
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Publish Application
        run: dotnet publish -c Release -r win-x64 -o ./publish
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Start Application
        shell: pwsh
        timeout-minutes: 25
        run: |
          Invoke-WebRequest -Uri https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath .
          .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

          # Use --pooling-enabled to avoid conflict if a previous run's tunnel is still active
          Start-Process -FilePath .\ngrok.exe -ArgumentList 'http','--url=sealdemo-nuget.ngrok.dev','--pooling-enabled','5000' -NoNewWindow
          Start-Sleep -Seconds 3

          # Start the app as a background process
          Start-Process -FilePath dotnet -ArgumentList '.\publish\seal-security-nuget-demo.dll' -NoNewWindow
          Start-Sleep -Seconds 5

          # Verify the app is running
          try {
            $response = Invoke-WebRequest -Uri http://localhost:5000 -UseBasicParsing -TimeoutSec 10
            Write-Host "App is running! Status: $($response.StatusCode)"
          } catch {
            Write-Host "Warning: Could not reach app on localhost:5000 - $_"
          }

          Write-Host ""
          Write-Host "=============================================="
          Write-Host "App: https://sealdemo-nuget.ngrok.dev"
          Write-Host "=============================================="
          Write-Host ""

          # Send the CVE-2024-21907 exploit via the URL parameter
          # The app fetches the deeply nested JSON from the json-payload repo and parses it
          $exploitUrl = "http://localhost:5000/?url=https://raw.githubusercontent.com/seal-sec-demo-2/json-payload/main/payload.json"
          Write-Host "Sending exploit: $exploitUrl"
          Write-Host ""

          try {
            $response = Invoke-WebRequest -Uri $exploitUrl -UseBasicParsing -TimeoutSec 30
            Write-Host "RESULT: App handled the payload safely (HTTP $($response.StatusCode))"
            Write-Host "Seal Security patch is ACTIVE - CVE-2024-21907 is mitigated!"
          } catch {
            Write-Host "RESULT: Server CRASHED - CVE-2024-21907 exploited!"
            Write-Host "The deeply nested JSON caused a StackOverflowException (Denial of Service)"
            Write-Host "Error: $_"
          }

          Write-Host ""

          # Check if app is still alive
          Start-Sleep -Seconds 3
          try {
            $check = Invoke-WebRequest -Uri http://localhost:5000 -UseBasicParsing -TimeoutSec 5
            Write-Host "App is still running (HTTP $($check.StatusCode)) - PATCHED"
          } catch {
            Write-Host "App is DOWN - process was killed by StackOverflowException - VULNERABLE"
          }

          Write-Host ""
          Write-Host "App will stay live for 20 minutes (if still running)."
          Write-Host ""

          # Keep the job alive so ngrok + app stay running for demo access
          Start-Sleep -Seconds 1200
