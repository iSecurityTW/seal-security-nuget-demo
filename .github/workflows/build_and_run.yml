name: "Build and Run"

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Configure Seal Security NuGet Feed
      run: |
        dotnet nuget add source https://nuget.sealsecurity.io/v3/index.json \
          --name Seal \
          --username nuget-demo \
          --password ${{ secrets.SEAL_TOKEN }} \
          --store-password-in-clear-text
      env:
        SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

    - name: Restore Dependencies
      run: dotnet restore
      env:
        SEAL_PROJECT: nuget-demo
        SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

    - name: Build Application
      run: dotnet build --no-restore

    - name: Publish Application
      run: dotnet publish -c Release -o ./publish

    - name: Run Server with ngrok
      run: |
        wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xzf ngrok-v3-stable-linux-amd64.tgz
        ./ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}
        ./ngrok http --url=sealdemo-nuget.ngrok.dev 5000 &
        sleep 3
        echo "App: https://sealdemo-nuget.ngrok.dev"
        echo ""
        echo "This demo uses Newtonsoft.Json 12.0.2 (CVE-2024-21907)"
        dotnet ./publish/seal-security-nuget-demo.dll
