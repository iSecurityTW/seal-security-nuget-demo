name: Seal Security Remediation

on:
  workflow_dispatch:
    inputs:
      fix_mode:
        description: 'Fix mode: remote (UI-approved), local (actions file), or all (everything available)'
        required: true
        default: 'remote'
        type: choice
        options:
          - remote
          - local
          - all

jobs:
  remediate-and-run:
    runs-on: windows-2022
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Download Seal CLI (Windows x64 v0.3.238)
        shell: pwsh
        run: |
          $cliUrl = "https://github.com/seal-community/cli/releases/download/v0.3.238/seal-windows-amd64-v0.3.238.exe"
          Invoke-WebRequest -Uri $cliUrl -OutFile seal.exe
          Write-Host "Seal CLI downloaded"
          .\seal.exe version

      - name: Seal Security - Fix Vulnerabilities
        shell: pwsh
        run: |
          .\seal.exe fix . --mode ${{ github.event.inputs.fix_mode || 'remote' }} -v
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Restore with Sealed Packages
        run: dotnet restore
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Build Application
        run: dotnet build --no-restore
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Publish Application
        run: dotnet publish -c Release -r win-x64 -o ./publish
        env:
          SEAL_PROJECT: nuget-demo
          SEAL_TOKEN: ${{ secrets.SEAL_TOKEN }}

      - name: Start Application
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath .
          .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}
          Start-Process -FilePath .\ngrok.exe -ArgumentList 'http','--url=sealdemo-nuget.ngrok.dev','5000' -NoNewWindow
          Start-Sleep -Seconds 3
          Write-Host "App: https://sealdemo-nuget.ngrok.dev"
          Write-Host ""
          Write-Host "Vulnerabilities have been patched by Seal Security!"
          dotnet .\publish\seal-security-nuget-demo.dll
